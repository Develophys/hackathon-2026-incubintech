name: zelo

services:
  postgres:
    image: postgres:16-alpine
    container_name: zelo-postgres
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: zelo-api
    restart: unless-stopped
    env_file: .env.docker
    # Local-only convenience: auto-migrate on boot against the Docker-network
    # Postgres. The image's own CMD stays migration-free (see api.Dockerfile).
    command: sh -c "pnpm --filter @zelo/api exec prisma migrate deploy && node apps/api/dist/src/main.js"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: zelo-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
