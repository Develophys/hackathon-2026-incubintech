app = "zelo-api"
primary_region = "gru"

[build]
  dockerfile = "docker/api.Dockerfile"

[env]
  PORT = "3000"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[[services.http_checks]]
  path = "/health"
  interval = "15s"
  timeout = "5s"
