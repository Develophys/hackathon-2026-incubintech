name: CI

on:
  push:
    branches: [main]
    paths-ignore: &docs-ignore
      - 'docs/**'
      - 'general-documentations/**'
      - 'imported-skills/**'
      - '.claude/**'
      - '.superpowers/**'
      - '**/*.md'
  pull_request:
    paths-ignore: *docs-ignore

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zelo
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: zelo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://zelo:devpassword@localhost:5432/zelo?schema=public
      DIRECT_DATABASE_URL: postgresql://zelo:devpassword@localhost:5432/zelo?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @zelo/api exec prisma generate

      - name: Apply database migrations
        run: pnpm --filter @zelo/api exec prisma migrate deploy

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Lint boundaries
        run: pnpm run lint:boundaries

      - name: Test
        run: pnpm test

  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/domain/**'
              - 'packages/config/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - 'fly.toml'

  deploy:
    needs: [build-lint-test, changes]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: curl -sf https://zelo-api.fly.dev/health | grep -q '"status":"ok"'
